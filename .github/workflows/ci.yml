name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Verify migrations apply cleanly
        run: supabase db start && supabase db reset

  deploy-note:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Netlify auto-deploys main via GitHub integration; previews build per-PR."
